<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSE Portfolio Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>My Portfolio Dashboard</h2>
    <div style="margin-bottom: 15px;">
    <input type="text" id="searchStock" placeholder="🔍 Search Symbol (e.g. SAMP)..." 
           style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
</div>

    <div class="input-form">
    <input type="text" id="symbol" placeholder="Symbol" list="symbol-list">
    
    <datalist id="symbol-list">
        </datalist>

    <input type="number" id="buyPrice" placeholder="BUY Price">
    <input type="number" id="qty" placeholder="Quantity">
    <input type="number" id="sellPrice" placeholder="Sell Price" value="0">
    <button id="addBtn">Add Data</button>
</div>

    <table>
        <thead>
    <tr>
        <th class="h-sym">Symbole</th>
        <th class="h-buy">BUY</th>
        <th class="h-qty">Quantity</th> <th class="h-tbuy">Total Buy</th> <th class="h-sprice">Sell price</th>
        <th class="h-inc">income</th>
        <th>Action</th>
    </tr>
</thead>
        <tbody id="stock-list"></tbody>
    </table>

    <div class="summary-section" style="margin-top: 20px; text-align: right; font-weight: bold; font-size: 20px;">
        <div style="color: #00b0f0;">Total Cost: Rs. <span id="overall-cost">0.00</span></div>
        <div style="color: #27ae60;">Total Income: Rs. <span id="overall-income">0.00</span></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
